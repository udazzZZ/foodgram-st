apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ $.Values.global.namespace }}
spec:
  serviceName: {{ .Chart.Name }}-headless-service
  replicas: {{ .Values.statefulset.replicas }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: {{ .Values.statefulset.image.name }}
          imagePullPolicy: {{ .Values.statefulset.image.pullPolicy }}
          ports:
            - name: {{ .Chart.Name }}
              containerPort: {{ .Values.service.ports.port }}
              protocol: {{ .Values.service.ports.protocol }}
          volumeMounts:
            - name: {{ .Values.statefulset.pvc.name }}
              mountPath: {{ .Values.statefulset.pvc.mountPath }}
  volumeClaimTemplates:
    - metadata:
        name: {{ .Values.statefulset.pvc.name }}
      spec:
        accessModes:
          - {{ .Values.statefulset.pvc.accessMode }}
        resources:
          requests:
            storage: "{{ .Values.statefulset.pvc.storage }}"
