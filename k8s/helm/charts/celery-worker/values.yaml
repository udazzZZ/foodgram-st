deployment:
  replicas: 1
  command: ["celery"]
  args: ["-A", "backend", "worker", "--loglevel=info"]
  env:
    secret:
      db:
        POSTGRES_USER: POSTGRES_USER
        POSTGRES_PASSWORD: POSTGRES_PASSWORD
        POSTGRES_DB: POSTGRES_DB
      rabbitmq:
        BROKER_USER: username
        BROKER_PASSWORD: password
      redis:
        REDIS_PASSWORD: password
    config:
      db:
        DB_HOST: DB_HOST
        DB_PORT: DB_PORT
      rabbitmq:
        BROKER_HOST: host
        BROKER_PORT: port
      redis:
        REDIS_HOST: host
        REDIS_PORT: port
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
